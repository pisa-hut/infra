server {
    listen 80;
    client_max_body_size 512M;

    # Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # Manager SSE feed — must stream unbuffered, so split off before the
    # generic /manager/ block. Long read timeout so idle connections stay
    # alive past the default 60 s.
    location = /manager/events {
        proxy_pass http://manager:9000/events;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }

    # Manager API
    location /manager/ {
        proxy_pass http://manager:9000/;
        proxy_set_header Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Renderer
    location /renderer/ {
        proxy_pass http://renderer:8800/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # PostgREST
    location /postgrest/ {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger UI
    location /swagger/ {
        proxy_pass http://swagger:8080/;
        proxy_set_header Host $host;
    }
}
