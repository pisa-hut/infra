server {
    listen 80;
    client_max_body_size 512M;

    # Compress proxied JSON/JS/CSS/HTML on the wire. The task-list payloads
    # (e.g. the unpaginated task summaries) are large, repetitive integer
    # JSON that shrinks ~20x gzipped — the difference between a snappy and a
    # "stuck" table over a real network. Disabled per-location for SSE below.
    gzip on;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    # Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # Manager SSE feed — must stream unbuffered, so split off before the
    # generic /manager/ block. Long read timeout so idle connections stay
    # alive past the default 60 s.
    location = /manager/events {
        proxy_pass http://manager:9000/events;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
        gzip off;  # gzip buffers; would defeat the unbuffered SSE stream
    }

    # Manager API
    location /manager/ {
        proxy_pass http://manager:9000/;
        proxy_set_header Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Renderer
    location /renderer/ {
        proxy_pass http://renderer:8800/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # PostgREST
    location /postgrest/ {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger UI
    location /swagger/ {
        proxy_pass http://swagger:8080/;
        proxy_set_header Host $host;
    }
}
