services:
  nginx:
    image: nginx:1.29.6
    container_name: nginx
    ports:
      - "${LISTEN_ADDR:-127.0.0.1}:7777:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - postgrest
      - swagger
      - manager
      - frontend
    restart: always

  frontend:
    build: ./frontend

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v14.6
    environment:
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_DB_URI: postgresql://authenticator:${AUTHENTICATOR_PASSWORD}@postgres:5432/${DB_NAME}
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: https://${SERVER_NAME:-localhost:8080}/postgrest
    depends_on:
      postgres:
        condition: service_healthy
      manager:
        condition: service_started
    restart: always

  swagger:
    image: swaggerapi/swagger-ui:v5.32.0
    environment:
      API_URL: /postgrest/
    depends_on:
      - postgrest

  manager:
    build: ./manager
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD}
      SCENARIO_STORAGE_DIR: /data
    volumes:
      - ${PISA_DATA_DIR:-/opt/pisa}:/data
    depends_on:
      postgres:
        condition: service_healthy

  renderer:
    build: ./esmini-renderer
    environment:
      RENDER_MODE: ${RENDER_MODE:-software}
      MANAGER_URL: http://manager:9000
    volumes:
      - render_cache:/tmp/render_cache
    depends_on:
      - manager

volumes:
  pgdata:
  render_cache:
